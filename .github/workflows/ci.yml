# Workflow name, will be shown on github actions dashboard
name: Phoenix Test Automation Workflow

# on is an event
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  # First test job
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Execute Test Automation Framework
      run: mvn clean test -DsuiteXmlFile=testng.xml -Denv=qa
      
    - name: Upload a build Artifact
      if: always()
      uses: actions/upload-artifact@v3.2.2
      with:
        name: SureFire report
        path: target/surefire-reports/
        retention-days: 10
    
